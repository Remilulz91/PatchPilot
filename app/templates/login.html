<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatchPilot — Connexion</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="login-form">
      <h1>Patch<span style="color:#38bdf8">Pilot</span></h1>
      <p class="sub">Gestion centralisée des mises à jour</p>

      <label for="username">Nom d'utilisateur</label>
      <input id="username" autocomplete="username" required>

      <label for="password">Mot de passe</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <div id="totp-block" style="display:none">
        <label for="totp">Code MFA (6 chiffres)</label>
        <input id="totp" inputmode="numeric" autocomplete="one-time-code" maxlength="6">
      </div>

      <button type="submit" class="full">Se connecter</button>
      <p class="error-msg" id="error"></p>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const totpBlock = document.getElementById('totp-block');
    const errEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const body = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      };
      const totp = document.getElementById('totp').value.trim();
      if (totp) body.totp_code = totp;

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.detail || 'Erreur'; return; }
        if (data.mfa_code_required) {
          totpBlock.style.display = 'block';
          document.getElementById('totp').focus();
          errEl.textContent = 'Saisissez votre code MFA.';
          return;
        }
        window.location.href = data.redirect || '/';
      } catch {
        errEl.textContent = 'Erreur réseau';
      }
    });
  </script>
</body>
</html>
