<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatchPilot — Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/i18n.js"></script>
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="login-form">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <span class="brand"><img class="logo" src="/static/favicon.svg" alt=""><h1>Patch<span style="color:#38bdf8">Pilot</span></h1></span>
        <button type="button" class="secondary small" id="lang-toggle">FR</button>
      </div>
      <p class="sub" data-i18n="subtitle"></p>

      <label for="username" data-i18n="username"></label>
      <input id="username" autocomplete="username" required>

      <label for="password" data-i18n="password"></label>
      <input id="password" type="password" autocomplete="current-password" required>

      <div id="totp-block" style="display:none">
        <label for="totp" id="totp-label" data-i18n="mfa_code"></label>
        <input id="totp" inputmode="numeric" autocomplete="one-time-code" maxlength="6">
        <a href="#" id="use-recovery" class="link-sm" data-i18n="use_recovery"></a>
      </div>

      <button type="submit" class="full" data-i18n="sign_in"></button>
      <p class="error-msg" id="error"></p>
    </form>
  </div>

  <script src="/static/login.js"></script>
</body>
</html>
