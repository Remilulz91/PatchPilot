<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatchPilot — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/i18n.js"></script>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:.8rem">
      <span class="brand"><img class="logo" src="/static/favicon.svg" alt=""><h1>Patch<span>Pilot</span></h1></span>
      <span class="badge idle" id="version-badge" style="display:none"></span>
    </div>
    <div class="actions">
      <span id="current-user" class="current-user"></span>
      <button class="secondary small" id="lang-toggle">FR</button>
      <button class="secondary small" id="btn-recovery" data-i18n="recovery_codes_btn"></button>
      <button class="secondary small" id="btn-users" data-i18n="users" style="display:none"></button>
      <button class="secondary small" id="btn-pubkey" data-i18n="ssh_pubkey"></button>
      <button class="secondary small" id="btn-logout" data-i18n="logout"></button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <button id="btn-add" data-i18n="add_machine"></button>
      <button class="secondary" id="btn-schedule" data-i18n="schedule_btn" style="display:none"></button>
      <span style="flex:1"></span>
      <button class="secondary" id="btn-check-all" data-i18n="check_all"></button>
      <button class="secondary" id="btn-run-all-full" data-i18n="update_all_full"></button>
      <button id="btn-run-all" data-i18n="update_all"></button>
    </div>

    <table>
      <thead>
        <tr>
          <th data-i18n="th_machine"></th>
          <th data-i18n="th_os"></th>
          <th data-i18n="th_updates"></th>
          <th data-i18n="th_status"></th>
          <th data-i18n="th_last"></th>
          <th data-i18n="th_actions"></th>
        </tr>
      </thead>
      <tbody id="machines"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none" data-i18n="empty"></div>
  </main>

  <!-- Docked live console (fixed at the bottom of the viewport) -->
  <div class="console-dock" id="console-dock">
    <div class="console-resize" id="console-resize" title="↕"></div>
    <div class="console-bar">
      <span class="console-title">▍ <span data-i18n="console_label"></span></span>
      <span style="flex:1"></span>
      <button class="secondary small" id="btn-clear-console" data-i18n="clear"></button>
      <button class="secondary small" id="btn-toggle-console" aria-label="toggle">▾</button>
    </div>
    <div id="console" class="console-body"><div style="color:var(--muted)" data-i18n="console_hint"></div></div>
  </div>

  <!-- Add machine modal -->
  <div class="modal-bg" id="modal-add">
    <form class="modal" id="form-add">
      <h2 data-i18n="add_title"></h2>
      <label data-i18n="name_label"></label>
      <input id="m-name" required maxlength="64" placeholder="srv-web-01">
      <label data-i18n="host_label"></label>
      <input id="m-host" required maxlength="255" placeholder="192.168.1.10">
      <label data-i18n="port_label"></label>
      <input id="m-port" type="number" value="22" min="1" max="65535">
      <label data-i18n="user_label"></label>
      <input id="m-user" value="root" maxlength="32">
      <p class="error-msg" id="add-error"></p>
      <div class="btns">
        <button type="button" class="secondary" data-close data-i18n="cancel"></button>
        <button type="submit" data-i18n="add"></button>
      </div>
    </form>
  </div>

  <!-- Public key modal -->
  <div class="modal-bg" id="modal-key">
    <div class="modal">
      <h2 data-i18n="key_title"></h2>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:.6rem" data-i18n="key_hint"></p>
      <pre id="pubkey">…</pre>
      <div class="btns">
        <button class="secondary" id="btn-copy-key" data-i18n="copy"></button>
        <button data-close data-i18n="close"></button>
      </div>
    </div>
  </div>

  <!-- Schedule modal (admin only) -->
  <div class="modal-bg" id="modal-schedule">
    <form class="modal" id="form-schedule">
      <h2 data-i18n="sched_title"></h2>
      <p class="sub" data-i18n="sched_intro"></p>

      <label class="u-admin-check"><input type="checkbox" id="sc-enabled"> <span data-i18n="sched_enable"></span></label>

      <div id="sc-options">
        <label data-i18n="sched_freq"></label>
        <select id="sc-freq">
          <option value="daily" data-i18n="sched_daily"></option>
          <option value="weekly" data-i18n="sched_weekly"></option>
        </select>

        <div id="sc-weekday-row" style="display:none">
          <label data-i18n="sched_day"></label>
          <select id="sc-weekday">
            <option value="0" data-i18n="day_mon"></option>
            <option value="1" data-i18n="day_tue"></option>
            <option value="2" data-i18n="day_wed"></option>
            <option value="3" data-i18n="day_thu"></option>
            <option value="4" data-i18n="day_fri"></option>
            <option value="5" data-i18n="day_sat"></option>
            <option value="6" data-i18n="day_sun"></option>
          </select>
        </div>

        <label data-i18n="sched_time"></label>
        <input type="time" id="sc-time" value="03:00">
        <p class="sub" data-i18n="sched_tz"></p>
      </div>

      <p class="error-msg" id="sched-error"></p>
      <div class="btns">
        <button type="button" class="secondary" data-close data-i18n="cancel"></button>
        <button type="submit" data-i18n="save"></button>
      </div>
    </form>
  </div>

  <!-- Recovery codes modal (all users) -->
  <div class="modal-bg" id="modal-recovery">
    <div class="modal">
      <h2 data-i18n="rc_manage_title"></h2>

      <div id="rc-manage">
        <p class="sub" id="rc-remaining"></p>
        <p class="sub" data-i18n="rc_regen_hint"></p>
        <label data-i18n="rc_confirm_label"></label>
        <input id="rc-code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456">
        <p class="error-msg" id="rc-error"></p>
        <div class="btns">
          <button type="button" class="secondary" data-close data-i18n="cancel"></button>
          <button type="button" id="btn-regen" data-i18n="rc_regenerate"></button>
        </div>
      </div>

      <div id="rc-result" style="display:none">
        <p class="sub" data-i18n="rc_intro"></p>
        <div class="recovery-grid" id="rc-new-grid"></div>
        <p class="recovery-warn" data-i18n="rc_warn"></p>
        <div class="btns">
          <button type="button" class="secondary" id="btn-copy-newrc" data-i18n="copy"></button>
          <button type="button" data-close data-i18n="rc_continue"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Users management modal (admin only) -->
  <div class="modal-bg" id="modal-users">
    <div class="modal" style="max-width:620px">
      <h2 data-i18n="users_title"></h2>

      <table class="users-table">
        <thead>
          <tr>
            <th data-i18n="u_th_user"></th>
            <th data-i18n="u_th_role"></th>
            <th data-i18n="u_th_status"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>

      <h3 class="u-subtitle" data-i18n="u_add_title"></h3>
      <form id="form-user" class="u-add-form">
        <input id="u-name" required maxlength="64" placeholder="jdupont" data-i18n-ph="u_name_ph">
        <label class="u-admin-check"><input type="checkbox" id="u-admin"> <span data-i18n="u_make_admin"></span></label>
        <button type="submit" data-i18n="u_create"></button>
      </form>
      <p class="error-msg" id="user-error"></p>

      <div id="invite-box" class="invite-box" style="display:none">
        <p class="sub" data-i18n="u_invite_hint"></p>
        <pre id="invite-link"></pre>
        <button class="secondary small" id="btn-copy-invite" data-i18n="copy"></button>
      </div>

      <div class="btns">
        <button data-close data-i18n="close"></button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
