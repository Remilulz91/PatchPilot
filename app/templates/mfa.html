<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatchPilot — MFA setup</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/i18n.js"></script>
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="mfa-form">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <img class="auth-logo" src="/static/favicon.svg" alt="" style="margin:0">
        <button type="button" class="secondary small" id="lang-toggle">FR</button>
      </div>
      <h1 data-i18n="mfa_title"></h1>
      <p class="sub" data-i18n="mfa_intro"></p>

      <ol class="mfa-steps">
        <li data-i18n="mfa_step1"></li>
        <li data-i18n="mfa_step2"></li>
        <li data-i18n="mfa_step3"></li>
      </ol>

      <img class="qr" id="qr" width="200" height="200" alt="MFA QR code">
      <p class="sub" data-i18n="manual_key"></p>
      <p class="secret" id="secret"></p>

      <label for="code" data-i18n="six_digit_code"></label>
      <input id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required>

      <button type="submit" class="full" data-i18n="enable_mfa"></button>
      <p class="error-msg" id="error"></p>
    </form>

    <!-- Recovery codes panel, shown once after MFA is enabled -->
    <div class="auth-card recovery-panel" id="recovery-panel" style="display:none">
      <h1 data-i18n="rc_title"></h1>
      <p class="sub" data-i18n="rc_intro"></p>
      <div class="recovery-grid" id="recovery-grid"></div>
      <p class="recovery-warn" data-i18n="rc_warn"></p>
      <button class="secondary small" id="btn-copy-rc" data-i18n="copy"></button>
      <button class="full" id="btn-rc-continue" data-i18n="rc_continue"></button>
    </div>
  </div>

  <script src="/static/mfa.js"></script>
</body>
</html>
